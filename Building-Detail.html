<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Building · IES Retrofit</title>
<meta name="viewport" content="width=1480" />
<style>
/* ──────────────────────────────────────────────────────────────────
   IES RETROFIT — design tokens (v7, ops console)

   Direction: Linear / Datadog / Vercel operational dashboard.
   • Dark sidebar nav (slate-900) → light content area (slate-50).
   • Sans-serif only (Inter / Geist). Mono for numbers & labels.
   • Dense, table-heavy, no decorative whitespace.
   • Status: literal green / amber / red / slate. No editorial framing.
   ─────────────────────────────────────────────────────────────────── */

@import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap");

:root {
  /* ── SIDEBAR (dark, ops-console) ───────────────────────────── */
  --nav-bg:           #0F172A;  /* slate-900 */
  --nav-bg-elev:      #1E293B;  /* slate-800 — section header */
  --nav-text:         #E2E8F0;  /* slate-200 */
  --nav-text-2:       #94A3B8;  /* slate-400 */
  --nav-text-3:       #64748B;  /* slate-500 */
  --nav-line:         #1E293B;  /* slate-800 — dividers */
  --nav-hover:        #1E293B;
  --nav-active-bg:    #1E293B;
  --nav-active-text:  #FFFFFF;
  --nav-accent:       #3B82F6;  /* blue-500 active stripe */

  /* ── CONTENT SURFACES (light) ──────────────────────────────── */
  --bg:        #F8FAFC;  /* slate-50 */
  --surface-0: #F1F5F9;  /* slate-100 */
  --surface-1: #FFFFFF;
  --surface-2: #F8FAFC;
  --surface-3: #F1F5F9;
  --surface-hover: #F1F5F9;

  /* ── LINES ─────────────────────────────────────────────────── */
  --line:        #E2E8F0;
  --line-strong: #CBD5E1;
  --line-soft:   #EEF2F7;
  --border:        var(--line);
  --border-strong: var(--line-strong);
  --border-soft:   var(--line-soft);

  /* ── TEXT (slate ramp, four steps) ─────────────────────────── */
  --text:    #0F172A;  /* slate-900 */
  --text-2:  #334155;  /* slate-700 */
  --text-3:  #64748B;  /* slate-500 */
  --text-4:  #94A3B8;  /* slate-400 */
  --text-muted: var(--text-2);

  /* ── STATUS ────────────────────────────────────────────────── */
  --status-completed:    #10B981;  /* emerald-500 */
  --status-in-progress:  #F59E0B;  /* amber-500 */
  --status-blocked:      #EF4444;  /* red-500 */
  --status-not-started:  #94A3B8;
  --status-warning:      #F59E0B;
  --status-info:         #3B82F6;  /* blue-500 */

  --status-completed-soft:   #ECFDF5;
  --status-in-progress-soft: #FEF3C7;
  --status-blocked-soft:     #FEE2E2;
  --status-not-started-soft: #F1F5F9;
  --status-warning-soft:     #FEF3C7;
  --status-info-soft:        #DBEAFE;

  /* ── ACCENT (links, focus, primary action) ─────────────────── */
  --accent:      #2563EB;  /* blue-600 */
  --accent-soft: #DBEAFE;
  --accent-dim:  #1D4ED8;

  /* Legacy aliases */
  --red:        var(--status-blocked);
  --red-soft:   var(--status-blocked-soft);
  --gold:       var(--status-in-progress);
  --gold-soft:  var(--status-in-progress-soft);
  --green:      var(--status-completed);
  --green-soft: var(--status-completed-soft);
  --blue:       var(--accent);
  --blue-soft:  var(--accent-soft);

  /* Type */
  --font-ui:   "Inter", -apple-system, "Segoe UI", sans-serif;
  --font-mono: "JetBrains Mono", ui-monospace, "SF Mono", monospace;

  --radius-sm: 4px;
  --radius:    6px;
  --radius-lg: 8px;

  --shadow-sm: 0 1px 2px rgba(15,23,42,0.04);
  --shadow:    0 1px 3px rgba(15,23,42,0.08), 0 1px 2px rgba(15,23,42,0.04);
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-ui);
  font-size: 13px;
  line-height: 1.45;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  font-feature-settings: "ss01", "cv11", "tnum";
}
button, input, select, textarea { font-family: inherit; }
button { cursor: pointer; }

.mono { font-family: var(--font-mono); font-variant-numeric: tabular-nums; letter-spacing: -0.01em; }
.tabular { font-variant-numeric: tabular-nums; }

/* Page title — sans only, restrained */
h1.page-title {
  font-family: var(--font-ui);
  font-weight: 600;
  font-size: 22px;
  line-height: 1.2;
  letter-spacing: -0.01em;
  color: var(--text);
  margin: 0;
}

/* Eyebrow / kicker */
.kicker {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--text-3);
  font-weight: 500;
}

/* Scrollbar */
::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--line-strong); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-4); }

/* ── Layout: sidebar + content ────────────────────────────── */
.app {
  display: grid;
  grid-template-columns: 232px 1fr;
  min-height: 100vh;
}
.content {
  min-width: 0;
  padding: 24px 28px 32px;
}
.content-narrow { max-width: 1320px; margin: 0 auto; }

/* Cards */
.card {
  background: var(--surface-1);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
}
.card-head {
  padding: 14px 18px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}
.card-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  letter-spacing: -0.005em;
}
.card-meta {
  font-family: var(--font-mono);
  font-size: 10.5px;
  color: var(--text-3);
  letter-spacing: 0.06em;
  text-transform: uppercase;
}

/* Pills */
.pill {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 2px 7px;
  border-radius: 4px;
  font-family: var(--font-mono);
  font-size: 9.5px;
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  border: 1px solid transparent;
  white-space: nowrap;
}
.pill-green { background: var(--status-completed-soft); color: var(--status-completed); }
.pill-gold  { background: var(--status-in-progress-soft); color: var(--status-in-progress); }
.pill-red   { background: var(--status-blocked-soft); color: var(--status-blocked); }
.pill-blue  { background: var(--status-info-soft); color: var(--status-info); }
.pill-gray  { background: var(--surface-0); color: var(--text-2); border-color: var(--border); }

/* Dots */
.dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
.dot-green { background: var(--status-completed); }
.dot-gold  { background: var(--status-in-progress); }
.dot-red   { background: var(--status-blocked); }
.dot-gray  { background: var(--status-not-started); }
.dot-blue  { background: var(--status-info); }

/* Pulse dot */
.pulse-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--status-completed);
  box-shadow: 0 0 0 0 rgba(16,185,129,0.5);
  animation: pulse 1.8s ease-out infinite;
}
@keyframes pulse {
  0%   { box-shadow: 0 0 0 0 rgba(16,185,129,0.4); }
  70%  { box-shadow: 0 0 0 7px rgba(16,185,129,0); }
  100% { box-shadow: 0 0 0 0 rgba(16,185,129,0); }
}

/* Buttons */
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  height: 28px; padding: 0 10px;
  background: var(--surface-1);
  border: 1px solid var(--border);
  color: var(--text-2);
  border-radius: 6px;
  font-size: 12px;
  font-weight: 500;
  white-space: nowrap;
  transition: all 120ms ease;
}
.btn:hover { background: var(--surface-3); color: var(--text); border-color: var(--text-4); }
.btn-primary {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
}
.btn-primary:hover { background: var(--accent-dim); border-color: var(--accent-dim); }
.btn-danger { background: var(--status-blocked); border-color: var(--status-blocked); color: #fff; }
.btn-danger:hover { background: #B91C1C; border-color: #B91C1C; }
.btn-ghost { border-color: transparent; background: transparent; }
.btn-ghost:hover { border-color: var(--border); background: var(--surface-3); }

/* kbd */
.kbd {
  display: inline-flex; align-items: center; justify-content: center;
  height: 18px; min-width: 18px; padding: 0 5px;
  background: var(--surface-1);
  border: 1px solid var(--border);
  border-bottom-width: 2px;
  border-radius: 4px;
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-2);
}

/* Tables */
.tbl { width: 100%; border-collapse: collapse; }
.tbl thead th {
  background: var(--surface-2);
  font-family: var(--font-mono);
  font-size: 9.5px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-3);
  font-weight: 600;
  padding: 9px 12px;
  text-align: left;
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}
.tbl tbody td {
  padding: 10px 12px;
  border-bottom: 1px solid var(--border-soft);
  font-size: 12.5px;
  color: var(--text);
  vertical-align: middle;
}
.tbl tbody tr { transition: background 80ms; }
.tbl tbody tr:hover { background: var(--surface-3); }
.tbl .num   { font-family: var(--font-mono); font-variant-numeric: tabular-nums; }
.tbl .right { text-align: right; }

/* Avatar */
.avatar {
  width: 24px; height: 24px; border-radius: 4px;
  display: inline-grid; place-items: center;
  font-family: var(--font-mono); font-size: 10px; font-weight: 600;
  flex-shrink: 0;
  background: var(--surface-3);
  border: 1px solid var(--border);
  color: var(--text-2);
}

/* Modal */
.modal-backdrop {
  position: fixed; inset: 0; z-index: 100;
  background: rgba(15,23,42,0.55);
  backdrop-filter: blur(2px);
  display: grid; place-items: center;
  padding: 24px;
}
.modal {
  background: var(--surface-1);
  border: 1px solid var(--border);
  border-radius: 10px;
  width: 100%;
  max-width: 640px;
  max-height: 80vh;
  overflow: hidden;
  display: flex; flex-direction: column;
  box-shadow: 0 20px 50px rgba(15,23,42,0.25);
}
.modal-head {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between; gap: 16px;
}
.modal-body { padding: 18px 20px; overflow: auto; flex: 1; }

/* Dropdown */
.dropdown {
  position: absolute;
  background: var(--surface-1);
  border: 1px solid var(--border);
  border-radius: 8px;
  box-shadow: 0 12px 30px rgba(15,23,42,0.15);
  z-index: 50;
  overflow: hidden;
  min-width: 200px;
}
.dropdown-item {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 12px;
  font-size: 12.5px;
  color: var(--text-2);
  cursor: pointer;
  transition: background 80ms;
  text-decoration: none;
  width: 100%;
  text-align: left;
  border: none;
  background: transparent;
}
.dropdown-item:hover { background: var(--surface-3); color: var(--text); }
.dropdown-sep { height: 1px; background: var(--border); margin: 4px 0; }

/* Form inputs */
.input {
  height: 32px;
  padding: 0 10px;
  background: var(--surface-1);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  font-size: 12.5px;
  outline: none;
  transition: border-color 120ms, box-shadow 120ms;
}
.input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-soft);
}
.select {
  height: 32px;
  padding: 0 26px 0 10px;
  background: var(--surface-1) url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='10' viewBox='0 0 10 10'><path d='M2 4l3 3 3-3' stroke='%2364748B' stroke-width='1.5' fill='none' stroke-linecap='round'/></svg>") no-repeat right 8px center;
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  font-size: 12.5px;
  appearance: none;
  cursor: pointer;
  white-space: nowrap;
}
.select:focus, .input:focus { outline: none; }

/* Toast */
.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--text);
  color: var(--surface-1);
  border-radius: 8px;
  padding: 10px 16px;
  font-size: 12.5px;
  box-shadow: 0 12px 30px rgba(15,23,42,0.30);
  display: flex; align-items: center; gap: 10px;
  z-index: 200;
  animation: toastIn 160ms ease-out;
}
.toast .dot { background: var(--status-completed); }
@keyframes toastIn {
  from { opacity: 0; transform: translate(-50%, 8px); }
  to   { opacity: 1; transform: translate(-50%, 0); }
}

/* Side panel */
.sidepanel-backdrop {
  position: fixed; inset: 0; z-index: 90;
  background: rgba(15,23,42,0.45);
}
.sidepanel {
  position: fixed; top: 0; right: 0; bottom: 0;
  width: 560px;
  background: var(--surface-1);
  border-left: 1px solid var(--border);
  z-index: 91;
  overflow: auto;
  box-shadow: -8px 0 24px rgba(15,23,42,0.10);
  animation: panelIn 180ms ease-out;
}
@keyframes panelIn { from { transform: translateX(20px); opacity: 0; } to { transform: none; opacity: 1; } }

/* Utility */
.flex { display: flex; }
.center { align-items: center; }
.between { justify-content: space-between; }
.gap-1 { gap: 4px; } .gap-2 { gap: 8px; } .gap-3 { gap: 12px; } .gap-4 { gap: 16px; }
.grow { flex: 1; min-width: 0; }
.truncate { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* Focus ring */
*:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 4px; }

a { color: inherit; text-decoration: none; }

</style>
</head>

<div id="app"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" data-presets="react">
// IES Retrofit — chrome (v7, ops console)
// Dark sidebar + light content. Sans-serif throughout. 7 nav sections.

// ============================================================================
// Icons (1.5px stroke, slate-200 default)
// ============================================================================
const Icon = ({ d, size = 16, fill = "none", strokeWidth = 1.5, viewBox = "0 0 24 24", ...rest }) => (

    {typeof d === "string" ? <path d={d} /> : d}
  </svg>

const IconHome      = (p) => <Icon {...p} d={<><path d="M3 11.5L12 4l9 7.5"/><path d="M5 10v10h14V10"/></>} />;

const IconChart     = (p) => <Icon {...p} d={<><path d="M3 3v18h18"/><path d="M7 14l4-4 4 4 5-6"/></>} />;

const IconSettings  = (p) => <Icon {...p} d={<><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.8-.3 1.7 1.7 0 0 0-1 1.5V21a2 2 0 1 1-4 0v-.1a1.7 1.7 0 0 0-1.1-1.5 1.7 1.7 0 0 0-1.8.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.7 1.7 0 0 0 .3-1.8 1.7 1.7 0 0 0-1.5-1H3a2 2 0 1 1 0-4h.1a1.7 1.7 0 0 0 1.5-1.1 1.7 1.7 0 0 0-.3-1.8l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.7 1.7 0 0 0 1.8.3H9a1.7 1.7 0 0 0 1-1.5V3a2 2 0 1 1 4 0v.1a1.7 1.7 0 0 0 1 1.5 1.7 1.7 0 0 0 1.8-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.7 1.7 0 0 0-.3 1.8V9a1.7 1.7 0 0 0 1.5 1H21a2 2 0 1 1 0 4h-.1a1.7 1.7 0 0 0-1.5 1z"/></>} />;

Object.assign(window, {
  Icon, IconHome, IconLayers, IconCheckSquare, IconFlag, IconBox, IconChart, IconUsers, IconSettings,
  IconSearch, IconBell, IconArrowR, IconChevR, IconChevD, IconUp, IconDown,
  IconClose, IconCheck, IconExternal, IconFilter, IconAlert, IconDownload, IconPlus,
  IconLogout, IconUser, IconDot, IconClock, IconDoc, IconCamera,

// ============================================================================
// Roles
// ============================================================================

];
function getRole() { try { return localStorage.getItem("ies.retrofit.role") || "program"; } catch(_) { return "program"; } }
function setRole(r) {
  try { localStorage.setItem("ies.retrofit.role", r); } catch(_) {}
  window.location.reload();
}
function currentUser() { return USERS.find(u => u.role === getRole()) || USERS[1]; }
// Returns buildings scoped by (a) active project, (b) user role visibility.
// When activeProject == ALL, returns buildings across ALL projects (each tagged
// with projectId / projectName).
function visiblePrograms() {
  const u = currentUser();
  let pool = window.PROGRAMS;
  if (u.role === "engineer") pool = pool.filter(p => p.engineer.id === u.engineerId);
  if (u.role === "project")  pool = pool.filter(p => p.projectMgr.id === u.projectMgrId);
  return pool;
}
function allProjects()  { return window.PROJECTS_DATA || []; }
function activeProject(){ return window.getActiveProject(); }
Object.assign(window, { USERS, getRole, setRole, currentUser, visiblePrograms, allProjects, activeProject });

// Active project id stored in localStorage. "ALL" = portfolio view (default).
function getActiveProjectId() {
  try { return localStorage.getItem("ies.activeProject") || "ALL"; } catch(_) { return "ALL"; }
}
function setActiveProjectId(id) {
  try { localStorage.setItem("ies.activeProject", id); } catch(_) {}
  window.location.reload();
}
function getActiveProject() {
  const id = getActiveProjectId();
  if (id === "ALL") return null;
  return (window.PROJECTS_DATA || []).find(p => p.id === id) || null;
}
Object.assign(window, { getActiveProjectId, setActiveProjectId, getActiveProject });

    case "engineer":    return "linear-gradient(135deg,#FDE68A,#F59E0B)";
    case "procurement": return "linear-gradient(135deg,#FCA5A5,#EF4444)";
    case "qaqc":        return "linear-gradient(135deg,#C7D2FE,#6366F1)";
    case "hse":         return "linear-gradient(135deg,#FECACA,#F87171)";

// ============================================================================
function useToast() {
  const [msg, setMsg] = React.useState(null);
  React.useEffect(() => {
    window.toast = (m) => { setMsg(m); setTimeout(() => setMsg(null), 2200); };
    return () => { delete window.toast; };
  }, []);
  if (!msg) return null;
  return <div className="toast"><span className="dot" /><span>{msg}</span></div>;
}
function ToastSlot() { return useToast(); }

function genBuildings(opts) {
  const { count, codePrefix, districts, seed, typesPool, acScale = 1.0, ledScale = 1.0 } = opts;
  let s = seed;
  const rnd = () => { s = (s * 1103515245 + 12345) >>> 0; return (s & 0x7fffffff) / 0x7fffffff; };
  const items = [];
  for (let i = 0; i < count; i++) {
    const district = districts[i % districts.length];
    const type = typesPool[Math.floor(rnd() * typesPool.length)];
    const code = `${codePrefix}-${String(i + 1).padStart(3, "0")}`;
    const name = `${type} — ${district}`;

    const r = rnd();
    let stageIdx;
    if      (r < 0.05) stageIdx = 11;
    else if (r < 0.12) stageIdx = 10;
    else if (r < 0.20) stageIdx = 9;
    else if (r < 0.28) stageIdx = 8;
    else if (r < 0.42) stageIdx = 7;
    else if (r < 0.58) stageIdx = 6;
    else if (r < 0.72) stageIdx = 5;
    else if (r < 0.83) stageIdx = 4;
    else if (r < 0.90) stageIdx = 3;
    else if (r < 0.95) stageIdx = 2;
    else if (r < 0.98) stageIdx = 1;
    else               stageIdx = 0;

    const r2 = rnd();
    let status;
    if      (stageIdx === 11) status = "completed";
    else if (r2 < 0.08)       status = "blocked";
    else if (stageIdx < 1)    status = "queue";
    else                      status = "in-progress";

    const engineer   = ENGINEERS_LIST[Math.floor(rnd() * ENGINEERS_LIST.length)];
    const projectMgr = PROJECT_MGRS[Math.floor(rnd() * PROJECT_MGRS.length)];
    const contractor = CONTRACTORS_LIST[Math.floor(rnd() * CONTRACTORS_LIST.length)];

    const acUnits = AC_TYPES.map(t => {
      if (t.qty === 0) return { typeId: t.id, qty: 0 };
      const avg = (t.qty / 72) * acScale;
      const q = Math.max(0, Math.round(avg * (0.5 + rnd() * 1.4)));
      return { typeId: t.id, qty: q };
    });
    const acQty = acUnits.reduce((a, u) => a + u.qty, 0);
    const ledQty = Math.round((60 + rnd() * 380) * ledScale);

    const stageStatus = STAGES.map((_, idx) => {
      if (idx < stageIdx) return "green";
      if (idx === stageIdx) return status === "blocked" ? "red" : status === "completed" ? "green" : "gold";
      return "gray";
    });
    const docs = ["MS","MOS","MIR","WIR","COC"].map((d) => {
      const needsAfter = { MS: 2, MOS: 3, MIR: 7, WIR: 8, COC: 10 }[d];
      if (stageIdx < needsAfter) return { key: d, status: "missing" };
      const dr = rnd();
      if (dr < 0.78)      return { key: d, status: "approved" };
      else if (dr < 0.90) return { key: d, status: "review" };
      else if (dr < 0.96) return { key: d, status: "rejected" };
      else                return { key: d, status: "draft" };
    });
    const blockerKind = status === "blocked"
      ? ["Material","Docs","Access","Mock-up"][Math.floor(rnd()*4)] : null;
    const blockerDays = status === "blocked" ? Math.floor(3 + rnd()*22) : null;

    items.push({
      code, name, type, district,
      stageIdx, status, engineer, projectMgr, contractor,
      acUnits, acQty, ledQty,
      stageStatus, docs, blockerKind, blockerDays,
    });
  }
  return items;
}

          <div className="card-meta" style={{ marginTop: 2 }}>{completedCount} of {total} stages complete · {pct}%</div>
        </div>
        <div style={{ display: "flex", gap: 8 }}>
          <button className="btn"><IconExternal size={12} /> Audit history</button>
          <button className="btn btn-primary"><IconCheck size={12} /> Advance stage</button>
        </div>
      </div>
      <div style={{ padding: "16px 18px 8px" }}>
        {/* Bar */}
        <div style={{ width: "100%", height: 4, background: "var(--surface-3)", borderRadius: 4, overflow: "hidden", marginBottom: 18 }}>
          <div style={{ width: `${pct}%`, height: "100%", background: "var(--status-completed)" }} />
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(12, 1fr)", gap: 8, alignItems: "stretch" }}>
          {window.STAGES.map((stg, i) => {
            const st = b.stageStatus[i];
            const isCurrent = i === b.stageIdx;
            return (
              <div key={stg.key} style={{
                position: "relative",
                padding: "10px 8px",
                background: isCurrent ? "var(--accent-soft)" : "var(--surface-1)",
                border: "1px solid " + (isCurrent ? "var(--accent)" : "var(--border)"),
                borderRadius: 6,
                minHeight: 78,
                display: "flex", flexDirection: "column", justifyContent: "space-between",
              }}>
                <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                  <span className="mono" style={{ fontSize: 9.5, letterSpacing: "0.06em", color: "var(--text-4)" }}>{stg.n}</span>
                  <span style={{
                    width: 7, height: 7, borderRadius: "50%",
                    background: st === "green" ? "var(--status-completed)" : st === "gold" ? "var(--status-in-progress)" : st === "red" ? "var(--status-blocked)" : "var(--text-4)",
                  }} />
                </div>
                <div style={{ fontSize: 11, lineHeight: 1.25, color: isCurrent ? "var(--text)" : "var(--text-2)", fontWeight: isCurrent ? 600 : 500 }}>
                  {stg.label.replace(/—.*$/, "").trim()}
                </div>
              </div>
            );
          })}
        </div>
        <div className="mono" style={{ fontSize: 10, color: "var(--text-3)", marginTop: 14, letterSpacing: "0.06em" }}>
          Current: <span style={{ color: "var(--text)", fontWeight: 600 }}>{window.STAGES[b.stageIdx].label}</span> · gate: {window.STAGES[b.stageIdx].gate}
        </div>
      </div>
    </div>
  );
}

function RoomsPanel({ rooms, b }) {
  return (
    <div className="card">
      <div className="card-head">
        <div className="card-title">Rooms ({rooms.length})</div>
        <button className="btn"><IconPlus size={12} /> Add room</button>
      </div>
      <table className="tbl">
        <thead>
          <tr><th>Room</th><th>Purpose</th><th className="right">Area (m²)</th><th className="right">AC units</th><th className="right">LED fixtures</th><th>Status</th></tr>
        </thead>
        <tbody>
          {rooms.map(r => (
            <tr key={r.id}>
              <td><span className="mono">{r.label}</span></td>
              <td>{r.purpose}</td>
              <td className="right num">{r.area}</td>
              <td className="right num">{r.ac}</td>
              <td className="right num">{r.led}</td>
              <td>{r.done ? <span className="pill pill-green">Done</span> : <span className="pill pill-gold">Pending</span>}</td>
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  );
}

function AssetsPanel({ assets }) {
  const grouped = {};
  assets.forEach(a => { grouped[a.kind] = grouped[a.kind] || []; grouped[a.kind].push(a); });
  return (
    <div className="card">
      <div className="card-head">
        <div className="card-title">Assets ({assets.length})</div>
        <div style={{ display: "flex", gap: 8 }}>
          <button className="btn"><IconDownload size={12} /> Asset register</button>
          <button className="btn btn-primary"><IconPlus size={12} /> Register asset</button>
        </div>
      </div>
      <table className="tbl">
        <thead>
          <tr><th>Asset tag</th><th>Type</th><th>Location</th><th>Serial</th><th>Status</th></tr>
        </thead>
        <tbody>
          {assets.slice(0, 14).map(a => (
            <tr key={a.tag}>
              <td><span className="mono">{a.tag}</span></td>
              <td>{a.kind}</td>
              <td style={{ color: "var(--text-2)" }}>{a.location}</td>
              <td><span className="mono" style={{ fontSize: 11, color: "var(--text-3)" }}>{a.serial}</span></td>
              <td>
                <span className={
                  a.status === "installed" ? "pill pill-green"
                  : a.status === "delivered" ? "pill pill-gold"
                  : "pill pill-gray"
                }>{a.status}</span>
              </td>
            </tr>
          ))}
        </tbody>
      </table>
      {assets.length > 14 && (
        <div style={{ padding: "10px 14px", borderTop: "1px solid var(--border)", textAlign: "center" }}>
          <button className="btn btn-ghost">Show {assets.length - 14} more</button>
        </div>
      )}
    </div>
  );
}

function MaterialsPanel({ events, b }) {
  const EVT_COLOR = {
    delivered: "var(--status-info)",
    installed: "var(--status-completed)",
    issued:    "var(--accent)",
    inspected: "var(--status-completed)",
    consumed:  "var(--status-in-progress)",
    received:  "var(--status-info)",
    reorder:   "var(--status-warning)",
  };
  return (
    <div className="card">
      <div className="card-head">
        <div className="card-title">Materials used ({events.length} events)</div>
        <button className="btn"><IconExternal size={12} /> Full BOQ</button>
      </div>
      <div>
        {events.map((e, i) => (
          <div key={i} style={{
            display: "grid", gridTemplateColumns: "90px 90px 100px 1fr 80px",
            gap: 14, alignItems: "center",
            padding: "11px 16px",
            borderBottom: i < events.length - 1 ? "1px solid var(--border-soft)" : "none",
          }}>
            <span className="mono" style={{ fontSize: 10.5, color: "var(--text-3)", letterSpacing: "0.04em" }}>{e.ts}</span>
            <span className="pill" style={{
              background: EVT_COLOR[e.kind] + "1A",
              color: EVT_COLOR[e.kind],
            }}>{e.kind}</span>
            <span style={{ fontSize: 12, color: "var(--text-2)" }}>{e.actor}</span>
            <span style={{ fontSize: 12.5, color: "var(--text)" }}>{e.desc}</span>
            <span className="mono num right" style={{ fontSize: 12, color: "var(--text-3)", textAlign: "right" }}>{e.qty != null ? `${e.qty} units` : "—"}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

function DocumentsPanel({ docs }) {
  return (
    <div className="card">
      <div className="card-head">
        <div className="card-title">Documents ({docs.length})</div>
        <button className="btn btn-primary"><IconPlus size={12} /> Upload</button>
      </div>
      <table className="tbl">
        <thead>
          <tr><th>Reference</th><th>Type</th><th>Title</th><th>Owner</th><th>Version</th><th>Status</th><th className="right">Updated</th></tr>
        </thead>
        <tbody>
          {docs.map(d => (
            <tr key={d.ref}>
              <td><span className="mono" style={{ fontSize: 11 }}>{d.ref}</span></td>
              <td><span className="mono" style={{ fontSize: 11, fontWeight: 600 }}>{d.type}</span></td>
              <td>{d.title}</td>
              <td style={{ color: "var(--text-2)" }}>{d.owner}</td>
              <td><span className="mono" style={{ fontSize: 11 }}>{d.ver}</span></td>
              <td>
                <span className={
                  d.status === "approved" ? "pill pill-green"
                  : d.status === "review" ? "pill pill-gold"
                  : d.status === "rejected" ? "pill pill-red"
                  : "pill pill-gray"
                }>{d.status === "missing" ? "Not yet" : d.status}</span>
              </td>
              <td className="right mono" style={{ fontSize: 11, color: "var(--text-3)" }}>{d.updated}</td>
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  );
}

function PhotosPanel({ b }) {
  // Sketch grid of 12 placeholder photos
  const photos = Array.from({ length: 12 }, (_, i) => ({
    id: i,
    tag: ["before","during","after","wir"][i % 4],
    label: `${b.code}-IMG-${String(i + 1).padStart(3, "0")}`,
    date: ["May 10", "May 8", "May 6", "Apr 30", "Apr 26"][i % 5],
  }));
  return (
    <div className="card">
      <div className="card-head">
        <div className="card-title">Photos ({photos.length})</div>
        <button className="btn btn-primary"><IconCamera size={12} /> Upload</button>
      </div>
      <div style={{ padding: 14, display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 12 }}>
        {photos.map(p => (
          <div key={p.id} style={{
            background: "var(--surface-2)",
            border: "1px solid var(--border)",
            borderRadius: 6,
            overflow: "hidden",
          }}>
            <div style={{
              aspectRatio: "4 / 3",
              background: "repeating-linear-gradient(45deg, var(--surface-3) 0 8px, var(--surface-0) 8px 16px)",
              display: "grid", placeItems: "center",
              color: "var(--text-4)",
            }}>
              <IconCamera size={24} />
            </div>
            <div style={{ padding: "8px 10px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <span className="mono" style={{ fontSize: 9.5, color: "var(--text-3)" }}>{p.label}</span>
              <span className="pill" style={{
                background: p.tag === "before" ? "var(--surface-3)" : p.tag === "during" ? "var(--status-in-progress-soft)" : p.tag === "after" ? "var(--status-completed-soft)" : "var(--status-info-soft)",
                color: p.tag === "before" ? "var(--text-2)" : p.tag === "during" ? "var(--status-in-progress)" : p.tag === "after" ? "var(--status-completed)" : "var(--status-info)",
              }}>{p.tag}</span>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

function ActivityPanel({ events }) {
  const KIND_COLOR = {
    stage:    "var(--status-completed)",
    doc:      "var(--status-info)",
    material: "var(--accent)",
    comment:  "var(--text-3)",
    photo:    "var(--status-warning)",
  };
  return (
    <div className="card">
      <div className="card-head"><div className="card-title">Activity log ({events.length})</div></div>
      <div>
        {events.map((e, i) => (
          <div key={i} style={{
            display: "grid", gridTemplateColumns: "100px 90px 130px 1fr",
            gap: 14, alignItems: "center",
            padding: "11px 16px",
            borderBottom: i < events.length - 1 ? "1px solid var(--border-soft)" : "none",
          }}>
            <span className="mono" style={{ fontSize: 10.5, color: "var(--text-3)", letterSpacing: "0.04em" }}>{e.ts}</span>
            <span className="pill" style={{
              background: KIND_COLOR[e.kind] + "1A",
              color: KIND_COLOR[e.kind],
            }}>{e.kind}</span>
            <span style={{ fontSize: 12, color: "var(--text-2)" }}>{e.actor}</span>
            <span style={{ fontSize: 12.5, color: "var(--text)" }}>{e.text}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

// ---------- Page -----------

function DetailPage() {
  const code = getQ("id") || (window.PROGRAMS[0]?.code || "MOI-001");
  const b = window.PROGRAMS.find(p => p.code === code) || window.PROGRAMS[0];
  const [tab, setTab] = React.useState("stages");

  const rooms    = React.useMemo(() => buildSampleRooms(b), [b.code]);
  const assets   = React.useMemo(() => buildAssets(b),      [b.code]);
  const matEvts  = React.useMemo(() => buildMaterialEvents(b), [b.code]);
  const docs     = React.useMemo(() => buildDocs(b),        [b.code]);
  const acts     = React.useMemo(() => buildActivity(b),    [b.code]);

  return (
    <PageShell active="programs">
      <PageHead
        kicker={(
          <span>
            <a href="Programs.html" style={{ color: "var(--text-3)" }}>Programs</a>
            <span style={{ color: "var(--text-4)", margin: "0 6px" }}>/</span>
            <span>{b.code}</span>
          </span>
        )}
        title={b.name}
        subtitle={(
          <span style={{ display: "inline-flex", alignItems: "center", gap: 10 }}>
            <StatusPill status={b.status} />
            <span style={{ color: "var(--text-3)" }}>· {b.district}</span>
            <span style={{ color: "var(--text-3)" }}>· {b.acQty} AC units · {b.ledQty} LED fixtures</span>
          </span>
        )}
        right={(
          <>
            <button className="btn"><IconExternal size={12} /> Open in floor plan</button>
            <button className="btn btn-primary"><IconCheck size={12} /> Update stage</button>
          </>
        )}
      />

      {/* Tabs */}
      <div style={{
        display: "flex", gap: 0, borderBottom: "1px solid var(--border)",
        marginBottom: 16,
      }}>
        {TABS.map(t => {
          const active = t.key === tab;
          return (
            <button
              key={t.key}
              onClick={() => setTab(t.key)}
              style={{
                background: "transparent",
                border: "none",
                padding: "10px 14px",
                fontSize: 12.5,
                fontWeight: active ? 600 : 500,
                color: active ? "var(--text)" : "var(--text-3)",
                borderBottom: "2px solid " + (active ? "var(--accent)" : "transparent"),
                marginBottom: -1,
                cursor: "pointer",
              }}
            >{t.label}</button>
          );
        })}
      </div>

      {tab === "stages"    && <StagesPanel b={b} />}
      {tab === "rooms"     && <RoomsPanel rooms={rooms} b={b} />}
      {tab === "assets"    && <AssetsPanel assets={assets} />}
      {tab === "materials" && <MaterialsPanel events={matEvts} b={b} />}
      {tab === "documents" && <DocumentsPanel docs={docs} />}
      {tab === "photos"    && <PhotosPanel b={b} />}
      {tab === "activity"  && <ActivityPanel events={acts} />}
    </PageShell>
  );
}

ReactDOM.createRoot(document.getElementById("app")).render(<DetailPage />);

</script>
</body>
</html>
