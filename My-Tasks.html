<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>My Tasks · IES Retrofit</title>
<meta name="viewport" content="width=1480" />
<style>
/* ──────────────────────────────────────────────────────────────────
   IES RETROFIT — design tokens (v7, ops console)

   Direction: Linear / Datadog / Vercel operational dashboard.
   • Dark sidebar nav (slate-900) → light content area (slate-50).
   • Sans-serif only (Inter / Geist). Mono for numbers & labels.
   • Dense, table-heavy, no decorative whitespace.
   • Status: literal green / amber / red / slate. No editorial framing.
   ─────────────────────────────────────────────────────────────────── */

@import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap");

:root {
  /* ── SIDEBAR (dark, ops-console) ───────────────────────────── */
  --nav-bg:           #0F172A;  /* slate-900 */
  --nav-bg-elev:      #1E293B;  /* slate-800 — section header */
  --nav-text:         #E2E8F0;  /* slate-200 */
  --nav-text-2:       #94A3B8;  /* slate-400 */
  --nav-text-3:       #64748B;  /* slate-500 */
  --nav-line:         #1E293B;  /* slate-800 — dividers */
  --nav-hover:        #1E293B;
  --nav-active-bg:    #1E293B;
  --nav-active-text:  #FFFFFF;
  --nav-accent:       #3B82F6;  /* blue-500 active stripe */

  /* ── CONTENT SURFACES (light) ──────────────────────────────── */
  --bg:        #F8FAFC;  /* slate-50 */
  --surface-0: #F1F5F9;  /* slate-100 */
  --surface-1: #FFFFFF;
  --surface-2: #F8FAFC;
  --surface-3: #F1F5F9;
  --surface-hover: #F1F5F9;

  /* ── LINES ─────────────────────────────────────────────────── */
  --line:        #E2E8F0;
  --line-strong: #CBD5E1;
  --line-soft:   #EEF2F7;
  --border:        var(--line);
  --border-strong: var(--line-strong);
  --border-soft:   var(--line-soft);

  /* ── TEXT (slate ramp, four steps) ─────────────────────────── */
  --text:    #0F172A;  /* slate-900 */
  --text-2:  #334155;  /* slate-700 */
  --text-3:  #64748B;  /* slate-500 */
  --text-4:  #94A3B8;  /* slate-400 */
  --text-muted: var(--text-2);

  /* ── STATUS ────────────────────────────────────────────────── */
  --status-completed:    #10B981;  /* emerald-500 */
  --status-in-progress:  #F59E0B;  /* amber-500 */
  --status-blocked:      #EF4444;  /* red-500 */
  --status-not-started:  #94A3B8;
  --status-warning:      #F59E0B;
  --status-info:         #3B82F6;  /* blue-500 */

  --status-completed-soft:   #ECFDF5;
  --status-in-progress-soft: #FEF3C7;
  --status-blocked-soft:     #FEE2E2;
  --status-not-started-soft: #F1F5F9;
  --status-warning-soft:     #FEF3C7;
  --status-info-soft:        #DBEAFE;

  /* ── ACCENT (links, focus, primary action) ─────────────────── */
  --accent:      #2563EB;  /* blue-600 */
  --accent-soft: #DBEAFE;
  --accent-dim:  #1D4ED8;

  /* Legacy aliases */
  --red:        var(--status-blocked);
  --red-soft:   var(--status-blocked-soft);
  --gold:       var(--status-in-progress);
  --gold-soft:  var(--status-in-progress-soft);
  --green:      var(--status-completed);
  --green-soft: var(--status-completed-soft);
  --blue:       var(--accent);
  --blue-soft:  var(--accent-soft);

  /* Type */
  --font-ui:   "Inter", -apple-system, "Segoe UI", sans-serif;
  --font-mono: "JetBrains Mono", ui-monospace, "SF Mono", monospace;

  --radius-sm: 4px;
  --radius:    6px;
  --radius-lg: 8px;

  --shadow-sm: 0 1px 2px rgba(15,23,42,0.04);
  --shadow:    0 1px 3px rgba(15,23,42,0.08), 0 1px 2px rgba(15,23,42,0.04);
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-ui);
  font-size: 13px;
  line-height: 1.45;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  font-feature-settings: "ss01", "cv11", "tnum";
}
button, input, select, textarea { font-family: inherit; }
button { cursor: pointer; }

.mono { font-family: var(--font-mono); font-variant-numeric: tabular-nums; letter-spacing: -0.01em; }
.tabular { font-variant-numeric: tabular-nums; }

/* Page title — sans only, restrained */
h1.page-title {
  font-family: var(--font-ui);
  font-weight: 600;
  font-size: 22px;
  line-height: 1.2;
  letter-spacing: -0.01em;
  color: var(--text);
  margin: 0;
}

/* Eyebrow / kicker */
.kicker {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--text-3);
  font-weight: 500;
}

/* Scrollbar */
::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--line-strong); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-4); }

/* ── Layout: sidebar + content ────────────────────────────── */
.app {
  display: grid;
  grid-template-columns: 232px 1fr;
  min-height: 100vh;
}
.content {
  min-width: 0;
  padding: 24px 28px 32px;
}
.content-narrow { max-width: 1320px; margin: 0 auto; }

/* Cards */
.card {
  background: var(--surface-1);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
}
.card-head {
  padding: 14px 18px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}
.card-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  letter-spacing: -0.005em;
}
.card-meta {
  font-family: var(--font-mono);
  font-size: 10.5px;
  color: var(--text-3);
  letter-spacing: 0.06em;
  text-transform: uppercase;
}

/* Pills */
.pill {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 2px 7px;
  border-radius: 4px;
  font-family: var(--font-mono);
  font-size: 9.5px;
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  border: 1px solid transparent;
  white-space: nowrap;
}
.pill-green { background: var(--status-completed-soft); color: var(--status-completed); }
.pill-gold  { background: var(--status-in-progress-soft); color: var(--status-in-progress); }
.pill-red   { background: var(--status-blocked-soft); color: var(--status-blocked); }
.pill-blue  { background: var(--status-info-soft); color: var(--status-info); }
.pill-gray  { background: var(--surface-0); color: var(--text-2); border-color: var(--border); }

/* Dots */
.dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
.dot-green { background: var(--status-completed); }
.dot-gold  { background: var(--status-in-progress); }
.dot-red   { background: var(--status-blocked); }
.dot-gray  { background: var(--status-not-started); }
.dot-blue  { background: var(--status-info); }

/* Pulse dot */
.pulse-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--status-completed);
  box-shadow: 0 0 0 0 rgba(16,185,129,0.5);
  animation: pulse 1.8s ease-out infinite;
}
@keyframes pulse {
  0%   { box-shadow: 0 0 0 0 rgba(16,185,129,0.4); }
  70%  { box-shadow: 0 0 0 7px rgba(16,185,129,0); }
  100% { box-shadow: 0 0 0 0 rgba(16,185,129,0); }
}

/* Buttons */
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  height: 28px; padding: 0 10px;
  background: var(--surface-1);
  border: 1px solid var(--border);
  color: var(--text-2);
  border-radius: 6px;
  font-size: 12px;
  font-weight: 500;
  white-space: nowrap;
  transition: all 120ms ease;
}
.btn:hover { background: var(--surface-3); color: var(--text); border-color: var(--text-4); }
.btn-primary {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
}
.btn-primary:hover { background: var(--accent-dim); border-color: var(--accent-dim); }
.btn-danger { background: var(--status-blocked); border-color: var(--status-blocked); color: #fff; }
.btn-danger:hover { background: #B91C1C; border-color: #B91C1C; }
.btn-ghost { border-color: transparent; background: transparent; }
.btn-ghost:hover { border-color: var(--border); background: var(--surface-3); }

/* kbd */
.kbd {
  display: inline-flex; align-items: center; justify-content: center;
  height: 18px; min-width: 18px; padding: 0 5px;
  background: var(--surface-1);
  border: 1px solid var(--border);
  border-bottom-width: 2px;
  border-radius: 4px;
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-2);
}

/* Tables */
.tbl { width: 100%; border-collapse: collapse; }
.tbl thead th {
  background: var(--surface-2);
  font-family: var(--font-mono);
  font-size: 9.5px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-3);
  font-weight: 600;
  padding: 9px 12px;
  text-align: left;
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}
.tbl tbody td {
  padding: 10px 12px;
  border-bottom: 1px solid var(--border-soft);
  font-size: 12.5px;
  color: var(--text);
  vertical-align: middle;
}
.tbl tbody tr { transition: background 80ms; }
.tbl tbody tr:hover { background: var(--surface-3); }
.tbl .num   { font-family: var(--font-mono); font-variant-numeric: tabular-nums; }
.tbl .right { text-align: right; }

/* Avatar */
.avatar {
  width: 24px; height: 24px; border-radius: 4px;
  display: inline-grid; place-items: center;
  font-family: var(--font-mono); font-size: 10px; font-weight: 600;
  flex-shrink: 0;
  background: var(--surface-3);
  border: 1px solid var(--border);
  color: var(--text-2);
}

/* Modal */
.modal-backdrop {
  position: fixed; inset: 0; z-index: 100;
  background: rgba(15,23,42,0.55);
  backdrop-filter: blur(2px);
  display: grid; place-items: center;
  padding: 24px;
}
.modal {
  background: var(--surface-1);
  border: 1px solid var(--border);
  border-radius: 10px;
  width: 100%;
  max-width: 640px;
  max-height: 80vh;
  overflow: hidden;
  display: flex; flex-direction: column;
  box-shadow: 0 20px 50px rgba(15,23,42,0.25);
}
.modal-head {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between; gap: 16px;
}
.modal-body { padding: 18px 20px; overflow: auto; flex: 1; }

/* Dropdown */
.dropdown {
  position: absolute;
  background: var(--surface-1);
  border: 1px solid var(--border);
  border-radius: 8px;
  box-shadow: 0 12px 30px rgba(15,23,42,0.15);
  z-index: 50;
  overflow: hidden;
  min-width: 200px;
}
.dropdown-item {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 12px;
  font-size: 12.5px;
  color: var(--text-2);
  cursor: pointer;
  transition: background 80ms;
  text-decoration: none;
  width: 100%;
  text-align: left;
  border: none;
  background: transparent;
}
.dropdown-item:hover { background: var(--surface-3); color: var(--text); }
.dropdown-sep { height: 1px; background: var(--border); margin: 4px 0; }

/* Form inputs */
.input {
  height: 32px;
  padding: 0 10px;
  background: var(--surface-1);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  font-size: 12.5px;
  outline: none;
  transition: border-color 120ms, box-shadow 120ms;
}
.input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-soft);
}
.select {
  height: 32px;
  padding: 0 26px 0 10px;
  background: var(--surface-1) url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='10' viewBox='0 0 10 10'><path d='M2 4l3 3 3-3' stroke='%2364748B' stroke-width='1.5' fill='none' stroke-linecap='round'/></svg>") no-repeat right 8px center;
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  font-size: 12.5px;
  appearance: none;
  cursor: pointer;
  white-space: nowrap;
}
.select:focus, .input:focus { outline: none; }

/* Toast */
.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--text);
  color: var(--surface-1);
  border-radius: 8px;
  padding: 10px 16px;
  font-size: 12.5px;
  box-shadow: 0 12px 30px rgba(15,23,42,0.30);
  display: flex; align-items: center; gap: 10px;
  z-index: 200;
  animation: toastIn 160ms ease-out;
}
.toast .dot { background: var(--status-completed); }
@keyframes toastIn {
  from { opacity: 0; transform: translate(-50%, 8px); }
  to   { opacity: 1; transform: translate(-50%, 0); }
}

/* Side panel */
.sidepanel-backdrop {
  position: fixed; inset: 0; z-index: 90;
  background: rgba(15,23,42,0.45);
}
.sidepanel {
  position: fixed; top: 0; right: 0; bottom: 0;
  width: 560px;
  background: var(--surface-1);
  border-left: 1px solid var(--border);
  z-index: 91;
  overflow: auto;
  box-shadow: -8px 0 24px rgba(15,23,42,0.10);
  animation: panelIn 180ms ease-out;
}
@keyframes panelIn { from { transform: translateX(20px); opacity: 0; } to { transform: none; opacity: 1; } }

/* Utility */
.flex { display: flex; }
.center { align-items: center; }
.between { justify-content: space-between; }
.gap-1 { gap: 4px; } .gap-2 { gap: 8px; } .gap-3 { gap: 12px; } .gap-4 { gap: 16px; }
.grow { flex: 1; min-width: 0; }
.truncate { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* Focus ring */
*:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 4px; }

a { color: inherit; text-decoration: none; }

</style>
</head>

];
function getRole() { try { return localStorage.getItem("ies.retrofit.role") || "program"; } catch(_) { return "program"; } }
function setRole(r) {
  try { localStorage.setItem("ies.retrofit.role", r); } catch(_) {}
  window.location.reload();
}
function currentUser() { return USERS.find(u => u.role === getRole()) || USERS[1]; }
// Returns buildings scoped by (a) active project, (b) user role visibility.
// When activeProject == ALL, returns buildings across ALL projects (each tagged
// with projectId / projectName).
function visiblePrograms() {
  const u = currentUser();
  let pool = window.PROGRAMS;
  if (u.role === "engineer") pool = pool.filter(p => p.engineer.id === u.engineerId);
  if (u.role === "project")  pool = pool.filter(p => p.projectMgr.id === u.projectMgrId);
  return pool;
}
function allProjects()  { return window.PROJECTS_DATA || []; }
function activeProject(){ return window.getActiveProject(); }
Object.assign(window, { USERS, getRole, setRole, currentUser, visiblePrograms, allProjects, activeProject });

// Active project id stored in localStorage. "ALL" = portfolio view (default).
function getActiveProjectId() {
  try { return localStorage.getItem("ies.activeProject") || "ALL"; } catch(_) { return "ALL"; }
}
function setActiveProjectId(id) {
  try { localStorage.setItem("ies.activeProject", id); } catch(_) {}
  window.location.reload();
}
function getActiveProject() {
  const id = getActiveProjectId();
  if (id === "ALL") return null;
  return (window.PROJECTS_DATA || []).find(p => p.id === id) || null;
}
Object.assign(window, { getActiveProjectId, setActiveProjectId, getActiveProject });

    case "engineer":    return "linear-gradient(135deg,#FDE68A,#F59E0B)";
    case "procurement": return "linear-gradient(135deg,#FCA5A5,#EF4444)";
    case "qaqc":        return "linear-gradient(135deg,#C7D2FE,#6366F1)";
    case "hse":         return "linear-gradient(135deg,#FECACA,#F87171)";

// ============================================================================
function useToast() {
  const [msg, setMsg] = React.useState(null);
  React.useEffect(() => {
    window.toast = (m) => { setMsg(m); setTimeout(() => setMsg(null), 2200); };
    return () => { delete window.toast; };
  }, []);
  if (!msg) return null;
  return <div className="toast"><span className="dot" /><span>{msg}</span></div>;
}
function ToastSlot() { return useToast(); }

function genBuildings(opts) {
  const { count, codePrefix, districts, seed, typesPool, acScale = 1.0, ledScale = 1.0 } = opts;
  let s = seed;
  const rnd = () => { s = (s * 1103515245 + 12345) >>> 0; return (s & 0x7fffffff) / 0x7fffffff; };
  const items = [];
  for (let i = 0; i < count; i++) {
    const district = districts[i % districts.length];
    const type = typesPool[Math.floor(rnd() * typesPool.length)];
    const code = `${codePrefix}-${String(i + 1).padStart(3, "0")}`;
    const name = `${type} — ${district}`;

    const r = rnd();
    let stageIdx;
    if      (r < 0.05) stageIdx = 11;
    else if (r < 0.12) stageIdx = 10;
    else if (r < 0.20) stageIdx = 9;
    else if (r < 0.28) stageIdx = 8;
    else if (r < 0.42) stageIdx = 7;
    else if (r < 0.58) stageIdx = 6;
    else if (r < 0.72) stageIdx = 5;
    else if (r < 0.83) stageIdx = 4;
    else if (r < 0.90) stageIdx = 3;
    else if (r < 0.95) stageIdx = 2;
    else if (r < 0.98) stageIdx = 1;
    else               stageIdx = 0;

    const r2 = rnd();
    let status;
    if      (stageIdx === 11) status = "completed";
    else if (r2 < 0.08)       status = "blocked";
    else if (stageIdx < 1)    status = "queue";
    else                      status = "in-progress";

    const engineer   = ENGINEERS_LIST[Math.floor(rnd() * ENGINEERS_LIST.length)];
    const projectMgr = PROJECT_MGRS[Math.floor(rnd() * PROJECT_MGRS.length)];
    const contractor = CONTRACTORS_LIST[Math.floor(rnd() * CONTRACTORS_LIST.length)];

    const acUnits = AC_TYPES.map(t => {
      if (t.qty === 0) return { typeId: t.id, qty: 0 };
      const avg = (t.qty / 72) * acScale;
      const q = Math.max(0, Math.round(avg * (0.5 + rnd() * 1.4)));
      return { typeId: t.id, qty: q };
    });
    const acQty = acUnits.reduce((a, u) => a + u.qty, 0);
    const ledQty = Math.round((60 + rnd() * 380) * ledScale);

    const stageStatus = STAGES.map((_, idx) => {
      if (idx < stageIdx) return "green";
      if (idx === stageIdx) return status === "blocked" ? "red" : status === "completed" ? "green" : "gold";
      return "gray";
    });
    const docs = ["MS","MOS","MIR","WIR","COC"].map((d) => {
      const needsAfter = { MS: 2, MOS: 3, MIR: 7, WIR: 8, COC: 10 }[d];
      if (stageIdx < needsAfter) return { key: d, status: "missing" };
      const dr = rnd();
      if (dr < 0.78)      return { key: d, status: "approved" };
      else if (dr < 0.90) return { key: d, status: "review" };
      else if (dr < 0.96) return { key: d, status: "rejected" };
      else                return { key: d, status: "draft" };
    });
    const blockerKind = status === "blocked"
      ? ["Material","Docs","Access","Mock-up"][Math.floor(rnd()*4)] : null;
    const blockerDays = status === "blocked" ? Math.floor(3 + rnd()*22) : null;

    items.push({
      code, name, type, district,
      stageIdx, status, engineer, projectMgr, contractor,
      acUnits, acQty, ledQty,
      stageStatus, docs, blockerKind, blockerDays,
    });
  }
  return items;
}

<script type="text/babel" data-presets="react">
// IES Retrofit — My Tasks
// Approval-chain cards: each task lives in a 4-stop pipeline.
// + Bottleneck Detection panel showing where queue is stuck.

// ============================================================================
// Approval chain stops (canonical order)
// ============================================================================
const STOPS = [
  { key: "engineer",   label: "Engineer",       role: "Project Eng." },
  { key: "pm",         label: "PM",             role: "Project Mgr" },
  { key: "program",    label: "Program Mgr",    role: "Program Mgr" },
  { key: "procurement",label: "Procurement",    role: "Procurement" },
];

// ============================================================================
// Deterministic task data (scoped to current user where it matters)
// ============================================================================
function genTasks() {
  let s = 11223;
  const rnd = () => { s = (s * 1103515245 + 12345) >>> 0; return (s & 0x7fffffff) / 0x7fffffff; };

  const KINDS = [
    { kind: "MS",    title: "MS — AC equipment package",       refPrefix: "MS"   },
    { kind: "MOS",   title: "MOS — AC + LED installation",     refPrefix: "MOS"  },
    { kind: "MIR",   title: "MIR — Brackets & hangers approval",refPrefix: "MIR" },
    { kind: "WIR",   title: "WIR — Floor 1 & 2 installation",  refPrefix: "WIR"  },
    { kind: "PO",    title: "PO — Window 1.5 TR shortfall",    refPrefix: "PO"   },
    { kind: "COC",   title: "COC — Building completion",       refPrefix: "COC"  },
    { kind: "STAGE", title: "Advance stage — Mock-up sign-off",refPrefix: "ST"   },
  ];
  const buildings = window.PROGRAMS.slice(0, 14);

  return buildings.map((b, i) => {
    const k = KINDS[i % KINDS.length];
    const stopIdx = Math.floor(rnd() * STOPS.length);   // current stop
    const stuckHours = Math.floor(2 + rnd() * 86);
    const stuckBucket = stuckHours < 8 ? "fresh" : stuckHours < 24 ? "queued" : stuckHours < 48 ? "slow" : "stuck";
    const raised = `${Math.floor(stuckHours / 24)}d ${stuckHours % 24}h`;
    // History per stop
    const history = STOPS.map((stop, si) => {
      if (si < stopIdx) {
        const hrs = Math.floor(2 + rnd() * 22);
        return { ...stop, status: "done", hrs };
      } else if (si === stopIdx) {
        return { ...stop, status: stuckBucket === "stuck" ? "blocked" : "in-review", hrs: stuckHours };
      }
      return { ...stop, status: "pending", hrs: null };
    });
    const sla = 24; // hours
    const overdue = history[stopIdx].hrs > sla;
    return {
      id: `T-${String(2100 + i).padStart(4, "0")}`,
      ref: `${k.refPrefix}-${b.code}-R${1 + Math.floor(rnd() * 3)}`,
      kind: k.kind,
      title: k.title,
      building: b,
      stopIdx,
      stuckHours,
      raised,
      overdue,
      bucket: stuckBucket,
      history,
      from: { name: b.engineer.name, init: b.engineer.init, role: "Engineer" },
    };
  });
}

// ============================================================================
// Bottleneck Detection — count tasks stuck at each stop
// ============================================================================
function bottleneckData(tasks) {
  const stops = STOPS.map(s => ({ ...s, count: 0, avgHrs: 0, overdue: 0 }));
  tasks.forEach(t => {
    const i = t.stopIdx;
    stops[i].count += 1;
    stops[i].avgHrs += t.history[i].hrs || 0;
    if (t.overdue) stops[i].overdue += 1;
  });
  stops.forEach(s => { if (s.count) s.avgHrs = Math.round(s.avgHrs / s.count); });
  const worst = [...stops].sort((a, b) => b.avgHrs - a.avgHrs)[0];
  return { stops, worst };
}

// ============================================================================
// UI bits
// ============================================================================
function KindPill({ kind }) {
  const map = {
    MS:    { c: "var(--status-info)",        bg: "var(--status-info-soft)" },
    MOS:   { c: "var(--accent)",             bg: "var(--accent-soft)" },
    MIR:   { c: "var(--status-completed)",   bg: "var(--status-completed-soft)" },
    WIR:   { c: "var(--status-completed)",   bg: "var(--status-completed-soft)" },
    PO:    { c: "var(--status-in-progress)", bg: "var(--status-in-progress-soft)" },
    COC:   { c: "var(--text-2)",             bg: "var(--surface-3)" },
    STAGE: { c: "var(--accent)",             bg: "var(--accent-soft)" },
  };
  const m = map[kind] || map.MS;
  return <span className="pill" style={{ background: m.bg, color: m.c }}>{kind}</span>;
}

function AgePill({ task }) {
  const c = task.bucket === "stuck" ? "var(--status-blocked)"
          : task.bucket === "slow"  ? "var(--status-warning)"
          : task.bucket === "queued"? "var(--text-2)" : "var(--text-3)";
  return (
    <span className="mono" style={{ fontSize: 11, color: c, fontWeight: 600 }}>
      {task.raised}
    </span>
  );
}

// Horizontal chain strip
function ChainStrip({ task }) {
  return (
    <div style={{ display: "grid", gridTemplateColumns: `repeat(${STOPS.length}, 1fr)`, gap: 0, position: "relative" }}>
      {task.history.map((h, i) => {
        const isCurrent = i === task.stopIdx;
        const isDone    = h.status === "done";
        const isBlocked = h.status === "blocked";
        let bg, fg, border;
        if (isDone)         { bg = "var(--status-completed-soft)"; fg = "var(--status-completed)"; border = "var(--status-completed)"; }
        else if (isBlocked) { bg = "var(--status-blocked-soft)";   fg = "var(--status-blocked)";   border = "var(--status-blocked)"; }
        else if (isCurrent) { bg = "var(--accent-soft)";           fg = "var(--accent)";           border = "var(--accent)"; }
        else                { bg = "var(--surface-2)";              fg = "var(--text-4)";           border = "var(--border)"; }
        return (
          <div key={h.key} style={{
            position: "relative",
            padding: "8px 10px",
            background: bg,
            border: "1px solid " + border,
            borderRadius: 0,
            marginLeft: i === 0 ? 0 : -1,
            borderLeftWidth: i === 0 ? 1 : 1,
            borderTopLeftRadius:    i === 0 ? 6 : 0,
            borderBottomLeftRadius: i === 0 ? 6 : 0,
            borderTopRightRadius:    i === STOPS.length - 1 ? 6 : 0,
            borderBottomRightRadius: i === STOPS.length - 1 ? 6 : 0,
            display: "flex", flexDirection: "column", gap: 3,
            zIndex: isCurrent ? 2 : 1,
          }}>
            <div className="mono" style={{ fontSize: 9, letterSpacing: "0.08em", textTransform: "uppercase", color: fg, fontWeight: 600 }}>
              {String(i + 1).padStart(2, "0")} · {h.label}
            </div>
            <div style={{ fontSize: 11.5, color: fg, fontWeight: 500, display: "flex", alignItems: "center", gap: 5 }}>
              {isDone     && <><IconCheck size={11} /> <span>Done · {h.hrs}h</span></>}
              {isBlocked  && <><IconAlert size={11} /> <span>Blocked · {h.hrs}h</span></>}
              {(isCurrent && !isBlocked) && <><span style={{ width: 6, height: 6, borderRadius: 50, background: fg, display: "inline-block" }} /> <span>In review · {h.hrs}h</span></>}
              {(!isDone && !isBlocked && !isCurrent) && <span>—</span>}
            </div>
          </div>
        );
      })}
    </div>
  );
}

function TaskCard({ task }) {
  return (
    <div className="card" style={{ padding: 0 }}>
      <div style={{
        display: "grid", gridTemplateColumns: "minmax(0, 1.4fr) minmax(0, 2fr) auto",
        gap: 18, padding: "14px 16px 12px",
        alignItems: "center",
      }}>
        <div style={{ minWidth: 0 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 4 }}>
            <KindPill kind={task.kind} />
            <span className="mono" style={{ fontSize: 10.5, color: "var(--text-4)", letterSpacing: "0.06em" }}>{task.ref}</span>
            {task.overdue && <span className="pill pill-red">Overdue</span>}
          </div>
          <a href={`Building-Detail.html?id=${task.building.code}`} style={{ fontSize: 13.5, color: "var(--text)", fontWeight: 500, textDecoration: "none" }}>
            {task.title}
          </a>
          <div className="mono" style={{ fontSize: 10.5, color: "var(--text-3)", marginTop: 4, letterSpacing: "0.04em" }}>
            {task.building.code} · {task.building.name}
          </div>
        </div>

        <div style={{ minWidth: 0 }}>
          <ChainStrip task={task} />
        </div>

        <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
          <div style={{ textAlign: "right" }}>
            <div className="mono" style={{ fontSize: 9, letterSpacing: "0.10em", textTransform: "uppercase", color: "var(--text-3)" }}>Raised</div>
            <AgePill task={task} />
          </div>
          <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
            <button className="btn btn-primary" style={{ height: 28, minWidth: 92 }}>Approve</button>
            <button className="btn" style={{ height: 28, minWidth: 92 }}>Reject</button>
          </div>
        </div>
      </div>
    </div>
  );
}

function BottleneckPanel({ tasks }) {
  const { stops, worst } = React.useMemo(() => bottleneckData(tasks), [tasks]);
  const total = tasks.length;
  const maxCount = Math.max(...stops.map(s => s.count), 1);
  return (
    <div className="card">
      <div className="card-head">
        <div>
          <div className="card-title">Bottleneck detection</div>
          <div className="card-meta" style={{ marginTop: 2 }}>
            {total} tasks across 4 stops · longest avg wait: <span style={{ color: "var(--status-blocked)" }}>{worst?.label} ({worst?.avgHrs}h)</span>
          </div>
        </div>
      </div>
      <div style={{ padding: 16 }}>
        <div style={{ display: "grid", gridTemplateColumns: `repeat(${stops.length}, 1fr)`, gap: 14 }}>
          {stops.map(s => {
            const pct = (s.count / maxCount) * 100;
            const isWorst = s.key === worst?.key;
            return (
              <div key={s.key} style={{
                padding: "12px 14px",
                background: isWorst ? "var(--status-blocked-soft)" : "var(--surface-1)",
                border: "1px solid " + (isWorst ? "var(--status-blocked)" : "var(--border)"),
                borderRadius: 8,
              }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline" }}>
                  <span className="mono" style={{ fontSize: 10, letterSpacing: "0.10em", textTransform: "uppercase", color: isWorst ? "var(--status-blocked)" : "var(--text-3)" }}>{s.label}</span>
                  <span className="mono tabular" style={{ fontSize: 18, fontWeight: 600, color: "var(--text)" }}>{s.count}</span>
                </div>
                <div style={{ width: "100%", height: 4, background: "var(--surface-3)", borderRadius: 4, overflow: "hidden", marginTop: 8 }}>
                  <div style={{ width: `${pct}%`, height: "100%", background: isWorst ? "var(--status-blocked)" : "var(--accent)" }} />
                </div>
                <div className="mono" style={{ display: "flex", justifyContent: "space-between", marginTop: 6, fontSize: 10.5, color: "var(--text-3)", letterSpacing: "0.04em" }}>
                  <span>avg {s.avgHrs}h wait</span>
                  <span style={{ color: s.overdue > 0 ? "var(--status-blocked)" : "var(--text-3)" }}>{s.overdue} overdue</span>
                </div>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

// ============================================================================
// Page
// ============================================================================
function MyTasksPage() {
  const u = currentUser();
  const tasks = React.useMemo(() => genTasks(), []);
  const [filter, setFilter] = React.useState("ALL");

  const counts = {
    ALL:        tasks.length,
    overdue:    tasks.filter(t => t.overdue).length,
    waiting:    tasks.filter(t => !t.overdue).length,
    stuck:      tasks.filter(t => t.bucket === "stuck").length,
  };
  const filtered = filter === "ALL"     ? tasks
                 : filter === "overdue" ? tasks.filter(t => t.overdue)
                 : filter === "waiting" ? tasks.filter(t => !t.overdue)
                 : filter === "stuck"   ? tasks.filter(t => t.bucket === "stuck")
                 : tasks;

  return (
    <PageShell active="my-tasks">
      <PageHead
        kicker="Approvals queue"
        title="My Tasks"
        subtitle={`${tasks.length} items routed through the approval chain · ${u.name}, ${u.subtitle}`}
        right={(
          <>
            <button className="btn"><IconFilter size={12} /> Filter</button>
            <button className="btn btn-primary"><IconPlus size={12} /> Raise request</button>
          </>
        )}
      />

      <BottleneckPanel tasks={tasks} />

      {/* Filter chips */}
      <div style={{ display: "flex", gap: 6, margin: "16px 0 12px" }}>
        {[
          { k: "ALL",     label: "All",       n: counts.ALL },
          { k: "overdue", label: "Overdue",   n: counts.overdue, color: "var(--status-blocked)" },
          { k: "waiting", label: "Waiting",   n: counts.waiting, color: "var(--status-in-progress)" },
          { k: "stuck",   label: "Stuck >48h",n: counts.stuck,    color: "var(--status-blocked)" },
        ].map(c => {
          const active = filter === c.k;
          return (
            <button key={c.k} onClick={() => setFilter(c.k)} style={{
              display: "inline-flex", alignItems: "center", gap: 8,
              padding: "6px 12px",
              background: active ? "var(--text)" : "var(--surface-1)",
              color: active ? "#fff" : "var(--text)",
              border: "1px solid " + (active ? "var(--text)" : "var(--border)"),
              borderRadius: 6,
              fontSize: 12, fontWeight: 500,
              cursor: "pointer",
            }}>
              {c.color && <span style={{ width: 6, height: 6, borderRadius: 50, background: c.color }} />}
              <span>{c.label}</span>
              <span className="mono" style={{ fontSize: 10.5, color: active ? "rgba(255,255,255,0.6)" : "var(--text-3)" }}>{c.n}</span>
            </button>
          );
        })}
      </div>

      <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
        {filtered.map(t => <TaskCard key={t.id} task={t} />)}
      </div>
    </PageShell>
  );
}

ReactDOM.createRoot(document.getElementById("app")).render(<MyTasksPage />);

</script>
</body>
</html>
